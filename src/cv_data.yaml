profile:
  en: "Analytics Engineer with over 5 years of experience building reliable data infrastructure, BI solutions, and end-to-end reporting pipelines across healthcare, legal insurance, FMCG, and manufacturing sectors. Proven track record designing scalable DBT data models, cloud-based pipelines, and executive dashboards that drive business performance and enable stakeholder self-service. Skilled in Python, SQL, DBT, and Snowflake, with hands-on experience in Azure (Data Factory, Synapse, Databricks), advanced data modeling (star/snowflake schema, OBTs, SCDs), and data quality frameworks including contracts and validation checks. Experienced applying AI tools to data workflows — including cloud AI and emerging AI platforms — to automate pipelines and improve data accessibility. Strong background in data governance, compliance data, cross-functional collaboration, and mentoring. Fluent in Spanish and English, with intermediate Portuguese."
  es: "Analytics Engineer con más de 5 años de experiencia construyendo infraestructura de datos confiable, soluciones de BI y pipelines de reportes end-to-end en sectores de salud, seguros legales, FMCG y manufactura. Historial comprobado diseñando modelos de datos DBT escalables, pipelines en la nube y dashboards ejecutivos que impulsan el rendimiento del negocio y permiten el autoservicio de stakeholders. Habilidades en Python, SQL, DBT y Snowflake, con experiencia práctica en Azure (Data Factory, Synapse, Databricks), modelado avanzado de datos (star/snowflake schema, OBTs, SCDs) y frameworks de calidad de datos incluyendo contratos y validaciones. Experiencia aplicando herramientas de IA a flujos de trabajo de datos para automatizar pipelines y mejorar la accesibilidad de datos. Sólida trayectoria en gobernanza de datos, datos de cumplimiento, colaboración interfuncional y mentoría. Fluido en español e inglés, con portugués intermedio."

